<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Retirement Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Worker Retirement Calculator</h1>

    <div class="calculator">
        <label for="age">Current Age:</label>
        <input type="number" id="age" placeholder="Enter your age">

        <label for="retire">Retirement Age:</label>
        <input type="number" id="retire" placeholder="Enter retirement age">

        <label for="salary">Current Salary ($):</label>
        <input type="number" id="salary" placeholder="Enter salary">

        <button onclick="calculate()">Calculate</button>

        <h2 id="result"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
